<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ekart - Edit Product</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">Ekart</a>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <button onclick="logout()">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container">
        <h1>Edit Product</h1>
        <form id="productForm" class="product-form" onsubmit="handleSubmit(event)">
            <input type="text" id="name" placeholder="Product Name" required>
            <input type="number" id="price" placeholder="Price" step="0.01" required>
            <textarea id="description" placeholder="Description" rows="3"></textarea>
            <input type="text" id="brand" placeholder="Brand">
            <select id="category" required>
                <option value="">Select Category</option>
                <option value="Electronics">Electronics</option>
                <option value="Clothing">Clothing</option>
                <option value="Home">Home</option>
                <option value="Books">Books</option>
                <option value="Sports">Sports</option>
            </select>
            <input type="number" id="stock" placeholder="Stock Quantity" required>
            <select id="productAvailable" required>
                <option value="">Product Available?</option>
                <option value="true">Yes</option>
                <option value="false">No</option>
            </select>
            <input type="date" id="releaseDate" placeholder="Release Date">
            <button type="submit">Update Product</button>
        </form>
    </div>

    <div id="toast" class="toast"></div>

    <script src="app.js"></script>
    <script>
        let productId;

        window.onload = () => {
            checkAuth();
            loadProduct();
        };

        async function loadProduct() {
            productId = new URLSearchParams(location.search).get('id');
            if (!productId) {
                location.href = 'index.html';
                return;
            }

            try {
                const response = await fetch(`http://localhost:8080/api/products/${productId}`, {
                    headers: { 'Authorization': 'Bearer ' + localStorage.getItem('token') }
                });
                if (!response.ok) throw new Error('Product not found');
                const product = await response.json();
                
                document.getElementById('name').value = product.name;
                document.getElementById('price').value = product.price;
                document.getElementById('description').value = product.description || '';
                document.getElementById('brand').value = product.brand || '';
                document.getElementById('category').value = product.category || '';
                document.getElementById('stock').value = product.stockQuantity || product.stock || 0;
                document.getElementById('productAvailable').value = product.productAvailable ? 'true' : 'false';
                document.getElementById('releaseDate').value = product.releaseDate || '';
            } catch (error) {
                showToast('Error loading product');
                setTimeout(() => location.href = 'index.html', 1500);
            }
        }

        async function handleSubmit(e) {
            e.preventDefault();
            
            const name = document.getElementById('name').value.trim();
            const price = document.getElementById('price').value;
            const description = document.getElementById('description').value.trim();
            const brand = document.getElementById('brand').value.trim();
            const category = document.getElementById('category').value;
            const stock = document.getElementById('stock').value;
            const productAvailable = document.getElementById('productAvailable').value;
            const releaseDate = document.getElementById('releaseDate').value;

            if (!name || !price || !category || !stock || !productAvailable) {
                showToast('Please fill all required fields');
                return;
            }

            console.log('Updating product:', productId, { name, price, category, stock, productAvailable });

            const productData = {
                name,
                price: parseFloat(price),
                description: description || null,
                brand: brand || null,
                category,
                stock: parseInt(stock),
                productAvailable: productAvailable === 'true',
                releaseDate: releaseDate || null
            };

            try {
                const response = await fetch(`http://localhost:8080/api/products/${productId}`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': 'Bearer ' + localStorage.getItem('token'),
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(productData)
                });

                console.log('Response status:', response.status);

                if (response.status === 403) {
                    showToast('Access denied: Admin only');
                    return;
                }
                if (!response.ok) {
                    const errorText = await response.text();
                    console.error('Error response:', errorText);
                    showToast('Failed to update product: ' + response.status);
                    return;
                }
                showToast('Product updated successfully');
                setTimeout(() => location.href = 'index.html', 1500);
            } catch (error) {
                console.error('Error:', error);
                showToast('Failed to update product: ' + error.message);
            }
        }
    </script>
</body>
</html>
